name: Build BLIS ILP64

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            blis_config: haswell
            artifact: libblis-x86_64.so
          - os: macos-14
            arch: arm64
            blis_config: firestorm
            artifact: libblis-firestorm.dylib

    runs-on: ${{ matrix.os }}
    name: BLIS ILP64 (${{ matrix.os }}, ${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Clone BLIS
        run: git clone --depth 1 https://github.com/flame/blis.git

      - name: Configure BLIS (ILP64)
        working-directory: blis
        run: |
          # -b 64: BLAS/CBLAS interface uses 64-bit integers
          #   NOTE: same symbol names (dgemm_, cblas_dgemm) but with 64-bit int args.
          #   jamma's blas_dispatch.c detects this via bli_info_get_int_type_size().
          # -i 64: internal BLIS integer size is 64-bit
          # --enable-shared: build shared library
          # --disable-static: skip static library
          ./configure \
            -b 64 \
            -i 64 \
            --enable-shared \
            --disable-static \
            --enable-cblas \
            --prefix=$PWD/../install \
            ${{ matrix.blis_config }}

      - name: Build BLIS
        working-directory: blis
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Install BLIS
        working-directory: blis
        run: make install

      - name: Verify ILP64 build
        run: |
          echo "=== Verifying BLIS ILP64 build ==="
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            LIB=$(find install/lib -name 'libblis.so*' -not -type l | head -1)
            NM_CMD="nm -D"
          else
            LIB=$(find install/lib -name 'libblis.dylib' | head -1)
            NM_CMD="nm -g"
          fi
          echo "Library: $LIB"
          echo "=== BLAS symbols ==="
          $NM_CMD "$LIB" | grep -i 'dgemm\|dsyrk' || true
          echo "=== BLIS info symbols ==="
          $NM_CMD "$LIB" | grep 'bli_info_get_int_type_size' \
            || { echo "FATAL: bli_info_get_int_type_size not found"; exit 1; }
          echo "=== CBLAS symbols ==="
          $NM_CMD "$LIB" | grep -i cblas_dgemm || true
          echo "=== dgemm_ present (BLIS -b 64 uses same name, 64-bit int ABI) ==="
          $NM_CMD "$LIB" | grep -q ' T.*dgemm_' \
            || { echo "FATAL: dgemm_ not found"; exit 1; }
          echo "=== Verification passed ==="

      - name: Package artifact
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            LIB=$(find install/lib -name 'libblis.so*' -not -type l | head -1)
            cp "$LIB" "${{ matrix.artifact }}"
          else
            LIB=$(find install/lib -name 'libblis.dylib' | head -1)
            cp "$LIB" "${{ matrix.artifact }}"
            # Set generic install_name for bundling
            install_name_tool -id "@loader_path/libs/libblis.dylib" "${{ matrix.artifact }}"
          fi
          echo "Artifact: ${{ matrix.artifact }}"
          ls -lh "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Flatten artifact directories
          mkdir -p release
          find artifacts -type f -name 'libblis*' -exec cp {} release/ \;
          ls -lh release/

          gh release create "$TAG_NAME" \
            --repo "$REPO_NAME" \
            --title "BLIS ILP64 $TAG_NAME" \
            --notes "Pre-built BLIS shared libraries with ILP64 (64-bit integer) BLAS interface.

          Built with \`-b 64 -i 64\`. Symbol names are unchanged (\`dgemm_\`, \`cblas_dgemm\`)
          but use 64-bit integer parameters. jamma detects this via \`bli_info_get_int_type_size()\`.

          Intel Mac (x86_64) is not included — macOS Accelerate provides ILP64 BLAS
          natively via \`\$NEWLAPACK\$ILP64\` symbols (macOS 13.3+).

          ## Assets
          - \`libblis-x86_64.so\` — Linux x86_64 (haswell config)
          - \`libblis-firestorm.dylib\` — macOS Apple Silicon (firestorm config)" \
            release/*
